<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HeyHoAI - Account Management</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a2e;
    --border: #2a2a3e; --text: #e4e4ed; --dim: #8888a0;
    --accent: #6c5ce7; --accent2: #a29bfe; --green: #00b894;
    --red: #ff7675; --orange: #fdcb6e;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--surface); }
  header h1 { font-size: 18px; font-weight: 700; color: var(--accent2); }
  header nav { display: flex; gap: 16px; }
  header nav a { color: var(--dim); text-decoration: none; font-size: 13px; font-weight: 500; transition: color 0.2s; }
  header nav a:hover, header nav a.active { color: var(--accent2); }

  .container { max-width: 900px; margin: 0 auto; padding: 32px 24px; }

  .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--dim); text-decoration: none; font-size: 13px; margin-bottom: 20px; transition: color 0.2s; }
  .back-link:hover { color: var(--accent2); }

  .account-header {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 24px; margin-bottom: 24px; display: flex; align-items: center; gap: 16px;
  }
  .account-header .avatar {
    width: 64px; height: 64px; border-radius: 50%; object-fit: cover;
    background: var(--surface2); border: 2px solid var(--border);
  }
  .account-header .info { flex: 1; }
  .account-header .name { font-size: 20px; font-weight: 700; }
  .account-header .username { font-size: 13px; color: var(--dim); margin-top: 4px; }
  .account-header .badges { display: flex; gap: 8px; margin-top: 8px; }
  .badge {
    display: inline-block; padding: 2px 10px; border-radius: 4px;
    font-size: 11px; font-weight: 600; text-transform: uppercase;
  }
  .badge-platform { background: rgba(225,48,108,0.15); color: #e1306c; }
  .badge-status-active { background: rgba(0,184,148,0.15); color: var(--green); }
  .badge-status-paused { background: rgba(253,203,110,0.15); color: var(--orange); }
  .badge-status-disabled { background: rgba(255,118,117,0.15); color: var(--red); }
  .account-header .stats { font-size: 12px; color: var(--dim); margin-top: 8px; }
  .account-header .stats strong { color: var(--text); }

  .section-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 24px; margin-bottom: 16px;
  }
  .section-card h3 {
    font-size: 15px; font-weight: 700; color: var(--accent2); margin-bottom: 16px;
    padding-bottom: 10px; border-bottom: 1px solid var(--border);
  }
  .section-card .placeholder {
    color: var(--dim); font-size: 13px; padding: 20px 0; text-align: center;
  }

  .form-input {
    width: 100%; padding: 10px 12px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-size: 13px; font-family: inherit; resize: vertical;
  }
  .form-input:focus { outline: none; border-color: var(--accent); }
  .form-select {
    padding: 8px 12px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 13px;
  }
  .form-label { display: block; font-size: 11px; font-weight: 600; color: var(--dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .action-btn {
    padding: 8px 18px; background: linear-gradient(135deg, var(--accent), #a29bfe);
    border: none; border-radius: 6px; color: white; font-size: 13px;
    font-weight: 600; cursor: pointer; white-space: nowrap;
  }
  .action-btn:hover { opacity: 0.9; }
  .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .base-photo-display { display: flex; align-items: center; gap: 16px; }
  .base-photo-display img { width: 120px; height: 120px; object-fit: cover; border-radius: 10px; border: 3px solid var(--green); }
  .base-photo-display .no-base { width: 120px; height: 120px; background: var(--surface2); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: var(--dim); font-size: 12px; text-align: center; }

  .media-select-item { cursor: pointer; position: relative; }
  .media-select-item.selected { border-color: var(--green); }
  .media-select-item .check-mark {
    position: absolute; top: 6px; right: 6px; width: 22px; height: 22px;
    background: var(--green); border-radius: 50%; display: none;
    align-items: center; justify-content: center; font-size: 12px; color: white;
  }
  .media-select-item.selected .check-mark { display: flex; }

  .media-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px;
  }
  .media-item {
    position: relative; border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; background: var(--surface2);
  }
  .media-item img, .media-item video {
    width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block;
  }
  .media-item .media-overlay {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 6px 8px; background: linear-gradient(transparent, rgba(0,0,0,0.8));
    display: flex; justify-content: space-between; align-items: center;
  }
  .media-item .media-status {
    font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 3px;
  }
  .media-status-ready { background: rgba(0,184,148,0.2); color: var(--green); }
  .media-status-posted { background: rgba(108,92,231,0.2); color: var(--accent2); }
  .media-item .media-delete {
    background: none; border: none; color: var(--red); font-size: 14px;
    cursor: pointer; opacity: 0.7; transition: opacity 0.2s;
  }
  .media-item .media-delete:hover { opacity: 1; }

  .toast { position: fixed; bottom: 20px; right: 20px; z-index: 300; padding: 12px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; transform: translateY(100px); opacity: 0; transition: all 0.3s; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: var(--green); color: white; }
  .toast.error { background: var(--red); color: white; }
</style>
</head>
<body>

<header>
  <h1>HeyHoAI</h1>
  <nav>
    <a href="/heyhoai/image/generater/page">Image Generator</a>
    <a href="/heyhoai/character/page">Characters</a>
    <a href="/heyhoai/accounts/page" class="active">Accounts</a>
    <a href="/heyhoai/logs/page">Logs</a>
  </nav>
</header>

<div class="container">
  <a class="back-link" href="/heyhoai/accounts/page">&larr; Back to Accounts</a>

  <div class="account-header" id="accountHeader">
    <div style="color:var(--dim);">Loading...</div>
  </div>

  <!-- 1. Base Photo -->
  <div class="section-card">
    <h3 style="display:flex;justify-content:space-between;align-items:center;">
      1. Base Photo
      <label style="padding:6px 14px;background:var(--accent);border-radius:6px;color:white;font-size:12px;font-weight:600;cursor:pointer;">
        Upload Base Photo
        <input type="file" accept="image/*" style="display:none;" onchange="uploadBasePhoto(this.files[0])">
      </label>
    </h3>
    <div id="basePhotoArea">
      <div class="placeholder">Loading...</div>
    </div>
  </div>

  <!-- 2. Outfit Variations -->
  <div class="section-card">
    <h3>2. Outfit Variations</h3>
    <div style="margin-bottom:12px;">
      <textarea id="outfitPrompt" class="form-input" placeholder="Describe the outfit and setting...&#10;&#10;Example: wearing a white summer dress, sitting at an outdoor cafe, holding iced coffee, natural sunlight" style="min-height:70px;"></textarea>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:14px;">
      <select id="outfitCount" class="form-select"><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4" selected>4</option></select>
      <select id="outfitModel" class="form-select"><option value="pro">Pro</option><option value="flash">Flash</option></select>
      <button onclick="generateOutfits()" class="action-btn" id="outfitBtn">Generate Outfits</button>
    </div>
    <div id="outfitResults"></div>
    <div style="margin-top:14px;">
      <label class="form-label">Generated Outfits</label>
      <div class="media-grid" id="outfitGrid"></div>
    </div>
  </div>

  <!-- 3. Reel Generation -->
  <div class="section-card">
    <h3>3. Reel Generation</h3>
    <div style="margin-bottom:8px;font-size:12px;color:var(--dim);">Select a photo below, enter a motion prompt, and generate a reel.</div>
    <div style="margin-bottom:12px;">
      <label class="form-label">Source Photo</label>
      <select id="reelSourceSelect" class="form-select" style="width:100%;"></select>
    </div>
    <div style="margin-bottom:12px;">
      <label class="form-label">Motion Prompt</label>
      <textarea id="reelPrompt" class="form-input" placeholder="Describe the motion...&#10;&#10;Example: slowly turning head, gentle smile, hair blowing in wind, subtle body movement" style="min-height:60px;"></textarea>
    </div>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:14px;">
      <select id="reelDuration" class="form-select"><option value="5">5s</option><option value="10">10s</option></select>
      <select id="reelMode" class="form-select"><option value="std">Standard</option><option value="pro">Pro</option></select>
      <label style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--dim);cursor:pointer;">
        <input type="checkbox" id="saveTemplateCheck"> Save as template
      </label>
      <button onclick="generateReel()" class="action-btn" id="reelBtn">Generate Reel</button>
    </div>
    <div style="margin-top:14px;">
      <label class="form-label">Generated Reels</label>
      <div class="media-grid" id="reelGrid"></div>
    </div>
  </div>

  <!-- 4. Batch Reels -->
  <div class="section-card">
    <h3>4. Batch Reels (from Template)</h3>
    <div style="margin-bottom:12px;">
      <label class="form-label">Reel Template</label>
      <select id="batchTemplateSelect" class="form-select" style="width:100%;"></select>
    </div>
    <div style="margin-bottom:12px;">
      <label class="form-label">Select photos to apply</label>
      <div class="media-grid" id="batchSelectGrid" style="margin-top:6px;"></div>
    </div>
    <button onclick="runBatchReels()" class="action-btn" id="batchBtn">Generate Batch Reels</button>
  </div>

  <!-- 5. All Media -->
  <div class="section-card">
    <h3 style="display:flex;justify-content:space-between;align-items:center;">
      All Media
      <label style="padding:6px 14px;background:var(--accent);border-radius:6px;color:white;font-size:12px;font-weight:600;cursor:pointer;">
        Upload
        <input type="file" accept="image/*,video/mp4" multiple style="display:none;" onchange="uploadFiles(this.files)">
      </label>
    </h3>
    <div class="media-grid" id="mediaGrid">
      <div class="placeholder">No media yet.</div>
    </div>
  </div>
</div>

<!-- Preview Modal -->
<div id="previewModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:200;align-items:center;justify-content:center;padding:20px;flex-direction:column;gap:12px;">
  <button onclick="closePreview()" style="position:absolute;top:16px;right:20px;background:none;border:none;color:white;font-size:28px;cursor:pointer;">&times;</button>
  <img id="previewImg" src="" style="display:none;max-width:90vw;max-height:80vh;object-fit:contain;border-radius:8px;">
  <video id="previewVideo" src="" controls style="display:none;max-width:90vw;max-height:80vh;border-radius:8px;"></video>
  <div id="previewInfo" style="font-size:12px;color:var(--dim);text-align:center;max-width:500px;"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  const accountId = window.location.pathname.split('/')[3];

  async function loadAccount() {
    try {
      const res = await fetch('/api/accounts/' + accountId);
      const data = await res.json();
      if (!data.success) {
        document.getElementById('accountHeader').innerHTML = '<div style="color:var(--red);">Account not found</div>';
        return;
      }
      const acc = data.data;
      document.title = `HeyHoAI - ${acc.display_name || acc.username}`;

      const statusClass = acc.status === 'active' ? 'badge-status-active'
        : acc.status === 'paused' ? 'badge-status-paused' : 'badge-status-disabled';

      document.getElementById('accountHeader').innerHTML = `
        ${acc.profile_image
          ? '<img class="avatar" src="' + acc.profile_image + '" alt="">'
          : '<div class="avatar" style="display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--dim);">' + (acc.platform?.[0]?.toUpperCase() || '?') + '</div>'}
        <div class="info">
          <div class="name">${acc.display_name || acc.username || 'Unknown'}</div>
          <div class="username">@${acc.username || acc.account_id}</div>
          <div class="badges">
            <span class="badge badge-platform">${acc.platform}</span>
            <span class="badge ${statusClass}">${acc.status}</span>
          </div>
          <div class="stats">
            Followers <strong>${acc.followers?.toLocaleString() || 0}</strong>
            &nbsp;&middot;&nbsp;
            Added <strong>${new Date(acc.created_at).toLocaleDateString('ko-KR')}</strong>
          </div>
        </div>
      `;
    } catch (e) {
      document.getElementById('accountHeader').innerHTML = '<div style="color:var(--red);">Failed to load account</div>';
    }
  }

  function showToast(msg, type = 'success') {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = 'toast ' + type + ' show';
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  let allMedia = [];
  let selectedBatchIds = new Set();

  // ── Base Photo ──
  async function loadBasePhoto() {
    const area = document.getElementById('basePhotoArea');
    const res = await fetch('/api/accounts/' + accountId + '/base-photo');
    const data = await res.json();

    if (data.data) {
      const filename = data.data.file_path?.split('/').pop();
      area.innerHTML = `
        <div class="base-photo-display">
          <img src="/images/${filename}" alt="Base photo">
          <div>
            <div style="font-size:13px;font-weight:600;">Current base photo</div>
            <div style="font-size:11px;color:var(--dim);margin-top:4px;">${filename}</div>
            <button onclick="changeBasePhoto()" style="margin-top:8px;padding:4px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--dim);font-size:11px;cursor:pointer;">Change</button>
          </div>
        </div>`;
    } else {
      area.innerHTML = `
        <div class="base-photo-display">
          <div class="no-base">No base photo</div>
          <div>
            <div style="font-size:13px;color:var(--dim);">Upload Base Photo 버튼으로 사진을 올리거나,<br>All Media에서 ★ 버튼으로 지정하세요.</div>
          </div>
        </div>`;
    }
  }

  async function setAsBase(mediaId) {
    const res = await fetch('/api/accounts/' + accountId + '/base-photo', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mediaId }),
    });
    const data = await res.json();
    if (data.success) {
      showToast('Base photo set', 'success');
      loadBasePhoto();
      loadMedia();
    } else {
      showToast(data.error || 'Failed', 'error');
    }
  }

  async function uploadBasePhoto(file) {
    if (!file) return;
    const formData = new FormData();
    formData.append('file', file);
    try {
      const res = await fetch('/api/accounts/' + accountId + '/media/upload', { method: 'POST', body: formData });
      const data = await res.json();
      if (data.success) {
        await setAsBase(data.data.id);
        loadMedia();
      } else {
        showToast(data.error || 'Upload failed', 'error');
      }
    } catch (e) {
      showToast('Upload error', 'error');
    }
  }

  function changeBasePhoto() {
    showToast('Click "Set Base" on any photo in All Media below', 'success');
    document.getElementById('mediaGrid').scrollIntoView({ behavior: 'smooth' });
  }

  // ── Outfit Generation ──
  async function generateOutfits() {
    const prompt = document.getElementById('outfitPrompt').value.trim();
    if (!prompt) { showToast('Enter outfit prompt', 'error'); return; }

    const btn = document.getElementById('outfitBtn');
    btn.disabled = true; btn.textContent = 'Generating...';

    try {
      const res = await fetch('/api/accounts/' + accountId + '/generate-outfits', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          prompt,
          count: document.getElementById('outfitCount').value,
          model: document.getElementById('outfitModel').value,
        }),
      });
      const data = await res.json();
      const container = document.getElementById('outfitResults');
      if (data.success) {
        const ok = data.results.filter(r => r.success).length;
        showToast(`${ok} outfit(s) generated`, 'success');
        loadMedia();
        loadReelSourceSelect();
      } else {
        showToast(data.error || 'Failed', 'error');
      }
    } catch (e) {
      showToast('Error: ' + e.message, 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'Generate Outfits';
    }
  }

  // ── Reel Source Select ──
  async function loadReelSourceSelect() {
    const sel = document.getElementById('reelSourceSelect');
    sel.innerHTML = '<option value="">Select a photo...</option>';
    const res = await fetch('/api/accounts/' + accountId + '/media');
    const data = await res.json();
    if (data.data) {
      allMedia = data.data;
      data.data.filter(m => m.media_type === 'image').forEach(m => {
        const filename = m.file_path?.split('/').pop();
        const label = m.is_base ? '[BASE] ' : '';
        const opt = document.createElement('option');
        opt.value = m.id;
        opt.textContent = label + filename + (m.caption ? ' — ' + m.caption.slice(0, 40) : '');
        sel.appendChild(opt);
      });
    }
  }

  // ── Reel Generation ──
  async function generateReel() {
    const mediaId = document.getElementById('reelSourceSelect').value;
    const prompt = document.getElementById('reelPrompt').value.trim();
    if (!mediaId) { showToast('Select source photo', 'error'); return; }
    if (!prompt) { showToast('Enter motion prompt', 'error'); return; }

    const btn = document.getElementById('reelBtn');
    btn.disabled = true; btn.textContent = 'Generating (1~3 min)...';

    try {
      const res = await fetch('/api/accounts/' + accountId + '/generate-reel', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          mediaId, prompt,
          duration: document.getElementById('reelDuration').value,
          mode: document.getElementById('reelMode').value,
          saveTemplate: document.getElementById('saveTemplateCheck').checked,
          templateName: prompt.slice(0, 60),
        }),
      });
      const data = await res.json();
      if (data.success) {
        showToast('Reel generated' + (data.template ? ' + template saved' : ''), 'success');
        loadMedia();
        loadTemplates();
      } else {
        showToast(data.error || 'Reel failed', 'error');
      }
    } catch (e) {
      showToast('Error: ' + e.message, 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'Generate Reel';
    }
  }

  // ── Templates ──
  async function loadTemplates() {
    const sel = document.getElementById('batchTemplateSelect');
    sel.innerHTML = '<option value="">Select template...</option>';
    const res = await fetch('/api/accounts/' + accountId + '/reel-templates');
    const data = await res.json();
    if (data.data) {
      data.data.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t.id;
        opt.textContent = t.name + ' (' + t.duration + 's, ' + t.mode + ')';
        sel.appendChild(opt);
      });
    }
  }

  // ── Batch Select Grid ──
  function renderBatchSelectGrid() {
    const grid = document.getElementById('batchSelectGrid');
    const images = allMedia.filter(m => m.media_type === 'image');
    if (images.length === 0) {
      grid.innerHTML = '<div class="placeholder">No images available</div>';
      return;
    }
    grid.innerHTML = '';
    images.forEach(m => {
      const filename = m.file_path?.split('/').pop();
      const div = document.createElement('div');
      div.className = 'media-item media-select-item' + (selectedBatchIds.has(m.id) ? ' selected' : '');
      div.onclick = () => { toggleBatchSelect(m.id); };
      div.innerHTML = `
        <img src="/images/${filename}" alt="" loading="lazy">
        <div class="check-mark">&#10003;</div>
      `;
      grid.appendChild(div);
    });
  }

  function toggleBatchSelect(id) {
    if (selectedBatchIds.has(id)) selectedBatchIds.delete(id);
    else selectedBatchIds.add(id);
    renderBatchSelectGrid();
  }

  // ── Batch Reels ──
  async function runBatchReels() {
    const templateId = document.getElementById('batchTemplateSelect').value;
    if (!templateId) { showToast('Select a template', 'error'); return; }
    if (selectedBatchIds.size === 0) { showToast('Select at least one photo', 'error'); return; }

    const btn = document.getElementById('batchBtn');
    btn.disabled = true; btn.textContent = `Generating ${selectedBatchIds.size} reels...`;

    try {
      const res = await fetch('/api/accounts/' + accountId + '/batch-reels', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ templateId, mediaIds: [...selectedBatchIds] }),
      });
      const data = await res.json();
      if (data.success) {
        const ok = data.results.filter(r => r.success).length;
        showToast(`${ok}/${data.results.length} reels generated`, 'success');
        selectedBatchIds.clear();
        loadMedia();
        renderBatchSelectGrid();
      } else {
        showToast(data.error || 'Batch failed', 'error');
      }
    } catch (e) {
      showToast('Error: ' + e.message, 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'Generate Batch Reels';
    }
  }

  // ── Category Grids (Outfits / Reels) ──
  function renderCategoryGrid(gridId, items) {
    const grid = document.getElementById(gridId);
    if (!items || items.length === 0) {
      grid.innerHTML = '<div style="color:var(--dim);font-size:12px;padding:10px;">None yet</div>';
      return;
    }
    grid.innerHTML = '';
    items.forEach(m => {
      const filename = m.file_path?.split('/').pop();
      const isVideo = m.media_type === 'video';
      const div = document.createElement('div');
      div.className = 'media-item';
      div.style.cursor = 'pointer';
      div.onclick = () => openPreview(m);
      div.innerHTML = isVideo
        ? `<video src="/images/${filename}" muted loop onmouseenter="this.play()" onmouseleave="this.pause()" style="width:100%;aspect-ratio:1/1;object-fit:cover;"></video>`
        : `<img src="/images/${filename}" alt="" loading="lazy">`;
      grid.appendChild(div);
    });
  }

  function getMeta(m) {
    if (!m.metadata) return {};
    if (typeof m.metadata === 'string') { try { return JSON.parse(m.metadata); } catch { return {}; } }
    return m.metadata;
  }

  function loadCategoryGrids() {
    const outfits = allMedia.filter(m => m.media_type === 'image' && getMeta(m).source === 'outfit_variation');
    const reels = allMedia.filter(m => m.media_type === 'video' && ['reel', 'batch_reel'].includes(getMeta(m).source));
    renderCategoryGrid('outfitGrid', outfits);
    renderCategoryGrid('reelGrid', reels);
  }

  // ── Preview Modal ──
  function openPreview(m) {
    const filename = m.file_path?.split('/').pop();
    const isVideo = m.media_type === 'video';
    const modal = document.getElementById('previewModal');
    const img = document.getElementById('previewImg');
    const video = document.getElementById('previewVideo');
    const info = document.getElementById('previewInfo');

    img.style.display = isVideo ? 'none' : 'block';
    video.style.display = isVideo ? 'block' : 'none';

    if (isVideo) { video.src = '/images/' + filename; }
    else { img.src = '/images/' + filename; }

    const created = m.created_at ? new Date(m.created_at).toLocaleString('ko-KR', { timeZone: 'Asia/Seoul' }) : '';
    info.innerHTML = `${created}${m.caption ? '<br>' + m.caption.slice(0, 200) : ''}`;

    modal.style.display = 'flex';
  }

  function closePreview() {
    const modal = document.getElementById('previewModal');
    modal.style.display = 'none';
    document.getElementById('previewVideo').pause();
    document.getElementById('previewVideo').src = '';
  }

  document.getElementById('previewModal').addEventListener('click', function(e) {
    if (e.target === this) closePreview();
  });

  async function loadMedia() {
    try {
      const res = await fetch('/api/accounts/' + accountId + '/media');
      const data = await res.json();
      const grid = document.getElementById('mediaGrid');

      if (!data.success || !data.data || data.data.length === 0) {
        grid.innerHTML = '<div class="placeholder">No media yet. Upload or register from Generate page.</div>';
        return;
      }

      allMedia = data.data;
      grid.innerHTML = '';
      data.data.forEach(m => {
        const filename = m.file_path?.split('/').pop();
        const isVideo = m.media_type === 'video';
        const statusClass = m.status === 'posted' ? 'media-status-posted' : 'media-status-ready';
        const div = document.createElement('div');
        div.className = 'media-item';
        div.style.cursor = 'pointer';
        div.onclick = () => openPreview(m);
        div.innerHTML = `
          ${isVideo
            ? '<video src="/images/' + filename + '" muted loop onmouseenter="this.play()" onmouseleave="this.pause()"></video>'
            : '<img src="/images/' + filename + '" alt="" loading="lazy">'}
          <div class="media-overlay">
            <span class="media-status ${statusClass}">${m.is_base ? 'BASE' : m.status}</span>
            <span style="display:flex;gap:4px;">
              ${m.media_type === 'image' && !m.is_base ? '<button class="media-delete" onclick="event.stopPropagation();setAsBase(\'' + m.id + '\')" title="Set as base" style="color:var(--green);">&#9733;</button>' : ''}
              <button class="media-delete" onclick="event.stopPropagation();deleteMedia('${m.id}')" title="Delete">&times;</button>
            </span>
          </div>
        `;
        grid.appendChild(div);
      });
      loadCategoryGrids();
    } catch (e) {
      console.error('Failed to load media:', e);
    }
  }

  async function uploadFiles(files) {
    for (const file of files) {
      const formData = new FormData();
      formData.append('file', file);
      try {
        const res = await fetch('/api/accounts/' + accountId + '/media/upload', {
          method: 'POST',
          body: formData,
        });
        const data = await res.json();
        if (data.success) {
          showToast('Uploaded: ' + file.name, 'success');
        } else {
          showToast(data.error || 'Upload failed', 'error');
        }
      } catch (e) {
        showToast('Upload error', 'error');
      }
    }
    loadMedia();
  }

  async function deleteMedia(mediaId) {
    if (!confirm('Delete this media?')) return;
    try {
      const res = await fetch('/api/accounts/media/' + mediaId, { method: 'DELETE' });
      const data = await res.json();
      if (data.success) {
        showToast('Deleted', 'success');
        loadMedia();
      } else {
        showToast(data.error || 'Failed', 'error');
      }
    } catch (e) {
      showToast('Error', 'error');
    }
  }

  loadAccount();
  loadBasePhoto();
  loadMedia().then(() => { loadReelSourceSelect(); renderBatchSelectGrid(); });
  loadTemplates();
</script>
</body>
</html>
