<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HeyHoAI - Logs</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a2e;
    --border: #2a2a3e; --text: #e4e4ed; --dim: #8888a0;
    --accent: #6c5ce7; --accent2: #a29bfe; --green: #00b894;
    --red: #ff7675; --orange: #fdcb6e;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--surface); }
  header h1 { font-size: 18px; font-weight: 700; color: var(--accent2); }
  header nav { display: flex; gap: 16px; }
  header nav a { color: var(--dim); text-decoration: none; font-size: 13px; font-weight: 500; transition: color 0.2s; }
  header nav a:hover, header nav a.active { color: var(--accent2); }

  .container { max-width: 1200px; margin: 0 auto; padding: 20px 24px; }

  .controls { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .controls select, .controls input {
    padding: 8px 12px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 13px;
  }
  .controls select:focus, .controls input:focus { outline: none; border-color: var(--accent); }
  .controls button {
    padding: 8px 16px; background: var(--accent); border: none; border-radius: 6px;
    color: white; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .controls button:hover { opacity: 0.9; }
  .controls .count { font-size: 12px; color: var(--dim); margin-left: auto; }

  .log-view {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 16px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px;
    line-height: 1.8; overflow-x: auto; max-height: calc(100vh - 180px); overflow-y: auto;
  }
  .log-line { white-space: pre-wrap; word-break: break-all; padding: 1px 0; }
  .log-line:hover { background: var(--surface2); }
  .log-line .ts { color: var(--dim); }
  .log-line .level-INFO  { color: var(--green); }
  .log-line .level-WARN  { color: var(--orange); }
  .log-line .level-ERROR { color: var(--red); }
  .log-line .level-DEBUG { color: var(--dim); }
  .log-line .tag { color: var(--accent2); }
  .empty { color: var(--dim); padding: 40px; text-align: center; }
</style>
</head>
<body>

<header>
  <h1>HeyHoAI</h1>
  <nav>
    <a href="/heyhoai/image/generater/page">Image Generator</a>
    <a href="/heyhoai/character/page">Characters</a>
    <a href="/heyhoai/accounts/page">Accounts</a>
    <a href="/heyhoai/logs/page" class="active">Logs</a>
  </nav>
</header>

<div class="container">
  <div class="controls">
    <select id="dateSelect"><option>Loading...</option></select>
    <select id="tagFilter">
      <option value="">All Tags</option>
      <option value="Video">Video</option>
      <option value="Audio">Audio</option>
      <option value="DB">DB</option>
      <option value="Server">Server</option>
      <option value="Error">Error</option>
    </select>
    <select id="levelFilter">
      <option value="">All Levels</option>
      <option value="debug">DEBUG</option>
      <option value="info">INFO</option>
      <option value="warn">WARN</option>
      <option value="error">ERROR</option>
    </select>
    <input type="number" id="lineCount" value="200" min="10" max="2000" style="width:80px;" title="Lines">
    <button onclick="loadLogs()">Load</button>
    <button onclick="loadLogs(); startAutoRefresh()" id="autoBtn">Auto</button>
    <span class="count" id="logCount"></span>
  </div>
  <div class="log-view" id="logView">
    <div class="empty">Select a date and click Load</div>
  </div>
</div>

<script>
  let autoTimer = null;

  async function loadLogFiles() {
    const res = await fetch('/api/generate/logs/files');
    const data = await res.json();
    const sel = document.getElementById('dateSelect');
    sel.innerHTML = '';
    if (data.data.length === 0) {
      sel.innerHTML = '<option>No logs yet</option>';
      return;
    }
    data.data.forEach((f, i) => {
      const opt = document.createElement('option');
      opt.value = f.name.replace('.log', '');
      opt.textContent = `${f.name} (${f.size})`;
      if (i === 0) opt.selected = true;
      sel.appendChild(opt);
    });
  }

  async function loadLogs() {
    const date = document.getElementById('dateSelect').value;
    const tag = document.getElementById('tagFilter').value;
    const level = document.getElementById('levelFilter').value;
    const lines = document.getElementById('lineCount').value;

    const params = new URLSearchParams({ date, lines });
    if (tag) params.set('tag', tag);
    if (level) params.set('level', level);

    const res = await fetch('/api/generate/logs?' + params);
    const data = await res.json();
    const view = document.getElementById('logView');
    document.getElementById('logCount').textContent = data.count + ' lines';

    if (!data.data || data.data.length === 0) {
      view.innerHTML = '<div class="empty">No logs found</div>';
      return;
    }

    view.innerHTML = data.data.map(line => {
      const m = line.match(/^(\S+)\s+(DEBUG|INFO|WARN|ERROR)\s+(\[.*?\])?\s*(.*)/);
      if (m) {
        return `<div class="log-line"><span class="ts">${m[1]}</span> <span class="level-${m[2]}">${m[2].padEnd(5)}</span> <span class="tag">${m[3] || ''}</span> ${escHtml(m[4])}</div>`;
      }
      return `<div class="log-line">${escHtml(line)}</div>`;
    }).join('');

    view.scrollTop = view.scrollHeight;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function startAutoRefresh() {
    const btn = document.getElementById('autoBtn');
    if (autoTimer) {
      clearInterval(autoTimer);
      autoTimer = null;
      btn.textContent = 'Auto';
      return;
    }
    autoTimer = setInterval(loadLogs, 5000);
    btn.textContent = 'Stop';
  }

  loadLogFiles().then(() => loadLogs());
</script>
</body>
</html>
