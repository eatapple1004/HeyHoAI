<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HeyHoAI - Character Management</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a2e;
    --border: #2a2a3e; --text: #e4e4ed; --dim: #8888a0;
    --accent: #6c5ce7; --accent2: #a29bfe; --green: #00b894;
    --red: #ff7675; --orange: #fdcb6e;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--surface); }
  header h1 { font-size: 18px; font-weight: 700; color: var(--accent2); }
  header nav { display: flex; gap: 16px; }
  header nav a { color: var(--dim); text-decoration: none; font-size: 13px; font-weight: 500; transition: color 0.2s; }
  header nav a:hover, header nav a.active { color: var(--accent2); }

  .container { max-width: 900px; margin: 0 auto; padding: 32px 24px; }

  .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 32px; }
  .form-card h2 { font-size: 16px; font-weight: 700; margin-bottom: 20px; color: var(--accent2); }
  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .form-input { width: 100%; padding: 10px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; font-family: inherit; }
  .form-input:focus { outline: none; border-color: var(--accent); }
  textarea.form-input { min-height: 80px; resize: vertical; }

  .submit-btn { width: 100%; padding: 14px; border: none; border-radius: 8px; background: linear-gradient(135deg, var(--accent), #a29bfe); color: white; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
  .submit-btn:hover { opacity: 0.9; }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .submit-btn .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Candidate Grid */
  .candidate-section { display: none; margin-bottom: 18px; }
  .candidate-section.show { display: block; }
  .candidate-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .candidate-item { position: relative; cursor: pointer; border: 3px solid transparent; border-radius: 10px; overflow: hidden; transition: border-color 0.2s; }
  .candidate-item:hover { border-color: var(--accent); }
  .candidate-item.selected { border-color: var(--green); }
  .candidate-item img { width: 100%; aspect-ratio: 3/4; object-fit: cover; }
  .candidate-check { position: absolute; top: 6px; right: 6px; width: 24px; height: 24px; background: var(--green); border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 14px; color: white; }
  .candidate-item.selected .candidate-check { display: flex; }

  /* Character List */
  .char-list h2 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
  .char-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
  .char-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: border-color 0.2s; }
  .char-card:hover { border-color: var(--accent); }
  .char-card-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: var(--surface2); }
  .char-card-body { padding: 14px; }
  .char-card-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .char-card-concept { font-size: 12px; color: var(--dim); line-height: 1.5; }
  .char-card-status { display: inline-block; margin-top: 8px; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .char-card-status.active { background: rgba(0,184,148,0.15); color: var(--green); }
  .char-card-actions { padding: 0 14px 14px; display: flex; gap: 8px; }
  .char-action-btn { flex: 1; padding: 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface2); color: var(--dim); font-size: 12px; cursor: pointer; text-align: center; transition: all 0.2s; text-decoration: none; }
  .char-action-btn:hover { border-color: var(--accent); color: var(--accent2); }
  .char-action-btn.danger:hover { border-color: var(--red); color: var(--red); }
  .no-ref-img { width: 100%; aspect-ratio: 1/1; background: var(--surface2); display: flex; align-items: center; justify-content: center; color: var(--dim); font-size: 13px; }

  .toast { position: fixed; bottom: 20px; right: 20px; z-index: 300; padding: 12px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; transform: translateY(100px); opacity: 0; transition: all 0.3s; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: var(--green); color: white; }
  .toast.error { background: var(--red); color: white; }
</style>
</head>
<body>

<header>
  <h1>HeyHoAI</h1>
  <nav>
    <a href="/heyhoai/image/generater/page">Image Generator</a>
    <a href="/heyhoai/character/page" class="active">Characters</a>
    <a href="/heyhoai/logs/page">Logs</a>
  </nav>
</header>

<div class="container">

  <!-- Create Form -->
  <div class="form-card">
    <h2>New Character</h2>

    <div class="form-group">
      <label>Name</label>
      <input type="text" class="form-input" id="charName" placeholder="Character name">
    </div>

    <div class="form-group">
      <label>Concept</label>
      <textarea class="form-input" id="charConcept" placeholder="Brief description of the character..."></textarea>
    </div>

    <div class="form-group">
      <label>Appearance Prompt</label>
      <textarea class="form-input" id="charPrompt" placeholder="Describe the character's appearance for ID photo generation...

Example: 25 year old korean woman, long straight black hair, large expressive eyes, v-line jawline, fair skin, natural makeup, gentle smile"></textarea>
    </div>

    <!-- Step 1: Generate -->
    <button class="submit-btn" id="generateBtn" onclick="generateCandidates()">Generate 4 Candidates</button>

    <!-- Step 2: Select -->
    <div class="candidate-section" id="candidateSection">
      <label style="display:block;font-size:12px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:0.5px;margin:16px 0 8px;">Select one as reference image</label>
      <div class="candidate-grid" id="candidateGrid"></div>
      <button class="submit-btn" id="saveBtn" onclick="saveCharacter()" style="margin-top:14px;" disabled>Save Character</button>
    </div>
  </div>

  <!-- Character List -->
  <div class="char-list">
    <h2>Characters</h2>
    <div class="char-grid" id="charGrid"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  let candidates = [];
  let selectedIdx = -1;

  // ── Generate 4 Candidates ──
  async function generateCandidates() {
    const name = document.getElementById('charName').value.trim();
    const concept = document.getElementById('charConcept').value.trim();
    const prompt = document.getElementById('charPrompt').value.trim();

    if (!name) { showToast('Name is required', 'error'); return; }
    if (!concept) { showToast('Concept is required', 'error'); return; }
    if (!prompt) { showToast('Appearance prompt is required', 'error'); return; }

    const btn = document.getElementById('generateBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Generating 4 photos...';

    document.getElementById('candidateSection').classList.remove('show');
    candidates = [];
    selectedIdx = -1;

    try {
      const formData = new FormData();
      formData.append('prompt', 'professional ID photo, passport photo style, white background, front facing, shoulders visible, neutral expression, studio lighting, high quality portrait, ' + prompt);
      formData.append('model', 'pro');
      formData.append('count', '4');

      const res = await fetch('/api/generate', { method: 'POST', body: formData });
      const data = await res.json();

      if (data.success) {
        candidates = data.results.filter(r => r.success);
        if (candidates.length === 0) {
          showToast('All generations blocked. Try different prompt.', 'error');
          return;
        }
        renderCandidates();
        document.getElementById('candidateSection').classList.add('show');
        showToast(candidates.length + ' photos generated', 'success');
      } else {
        showToast(data.error || 'Generation failed', 'error');
      }
    } catch (e) {
      showToast('Network error: ' + e.message, 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Generate 4 Candidates';
    }
  }

  function renderCandidates() {
    const grid = document.getElementById('candidateGrid');
    grid.innerHTML = '';
    candidates.forEach((c, idx) => {
      const div = document.createElement('div');
      div.className = 'candidate-item' + (idx === selectedIdx ? ' selected' : '');
      div.onclick = () => selectCandidate(idx);
      div.innerHTML = `
        <img src="${c.url}" alt="Candidate ${idx+1}">
        <div class="candidate-check">&#10003;</div>
      `;
      grid.appendChild(div);
    });
    document.getElementById('saveBtn').disabled = selectedIdx < 0;
  }

  function selectCandidate(idx) {
    selectedIdx = idx;
    renderCandidates();
  }

  // ── Save Character ──
  async function saveCharacter() {
    if (selectedIdx < 0) { showToast('Select a photo first', 'error'); return; }

    const name = document.getElementById('charName').value.trim();
    const concept = document.getElementById('charConcept').value.trim();
    const selectedUrl = candidates[selectedIdx].url;
    const selectedFilename = selectedUrl.split('/').pop();

    const btn = document.getElementById('saveBtn');
    btn.disabled = true;
    btn.textContent = 'Saving...';

    try {
      const res = await fetch('/api/characters/register-with-image', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, concept, imageFilename: selectedFilename }),
      });
      const data = await res.json();

      if (data.success) {
        showToast('Character created: ' + data.data.name, 'success');
        document.getElementById('charName').value = '';
        document.getElementById('charConcept').value = '';
        document.getElementById('charPrompt').value = '';
        document.getElementById('candidateSection').classList.remove('show');
        candidates = [];
        selectedIdx = -1;
        loadCharacters();
      } else {
        showToast(data.error || 'Failed', 'error');
      }
    } catch (e) {
      showToast('Network error', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Save Character';
    }
  }

  // ── Load Characters ──
  async function loadCharacters() {
    try {
      const res = await fetch('/api/characters');
      const data = await res.json();
      const grid = document.getElementById('charGrid');
      grid.innerHTML = '';

      const chars = data.success ? (Array.isArray(data.data) ? data.data : data.data.rows || []) : [];

      if (chars.length === 0) {
        grid.innerHTML = '<div style="color:var(--dim);font-size:14px;padding:40px;">No characters yet.</div>';
        return;
      }

      chars.forEach(c => {
        const refFilename = c.reference_image_url ? c.reference_image_url.split('/').pop() : null;
        const card = document.createElement('div');
        card.className = 'char-card';
        card.innerHTML = `
          ${refFilename
            ? '<img class="char-card-img" src="/images/' + refFilename + '" alt="" loading="lazy">'
            : '<div class="no-ref-img">No reference image</div>'}
          <div class="char-card-body">
            <div class="char-card-name">${c.name}</div>
            <div class="char-card-concept">${c.concept || ''}</div>
            <span class="char-card-status ${c.status}">${c.status}</span>
          </div>
          <div class="char-card-actions">
            <a class="char-action-btn" href="/heyhoai/image/generater/page">Generate</a>
            <button class="char-action-btn danger" onclick="deleteCharacter('${c.id}', '${c.name}')">Delete</button>
          </div>
        `;
        grid.appendChild(card);
      });
    } catch (e) {
      console.error('Failed to load characters:', e);
    }
  }

  async function deleteCharacter(id, name) {
    if (!confirm('Delete character "' + name + '"?')) return;
    try {
      const res = await fetch('/api/characters/' + id, { method: 'DELETE' });
      const data = await res.json();
      if (data.success) {
        showToast('Character deleted', 'success');
        loadCharacters();
      } else {
        showToast(data.error || 'Failed', 'error');
      }
    } catch (e) {
      showToast('Network error', 'error');
    }
  }

  function showToast(msg, type = 'success') {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = 'toast ' + type + ' show';
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  loadCharacters();
</script>
</body>
</html>
